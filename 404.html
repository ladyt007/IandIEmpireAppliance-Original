<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found | I And I Empire</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root { --green:#00C829; --black:#111111; --gray-400:#999; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--black); color:#fff; min-height:100vh; display:flex; align-items:center; justify-content:center; text-align:center; padding:40px 20px; }
  .container { max-width:480px; }
  .num { font-family:'Bebas Neue',sans-serif; font-size:140px; line-height:1; color:var(--green); letter-spacing:0.04em; }
  h1 { font-family:'Bebas Neue',sans-serif; font-size:36px; color:#fff; margin-bottom:14px; letter-spacing:0.04em; }
  p { font-size:16px; color:var(--gray-400); font-weight:300; line-height:1.7; margin-bottom:32px; }
  .btn { display:inline-block; background:var(--green); color:#fff; padding:14px 32px; border-radius:9px; font-size:14px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; text-decoration:none; margin:6px; transition:opacity 0.2s; }
  .btn:hover { opacity:0.85; }
  .btn-outline { background:transparent; border:2px solid rgba(255,255,255,0.2); color:rgba(255,255,255,0.6); }
  .btn-outline:hover { border-color:var(--green); color:var(--green); opacity:1; }
</style>
</head>
<body>
  <div class="container">
    <div class="num">404</div>
    <h1>Page Not Found</h1>
    <p>The page you are looking for does not exist or may have been moved. Let us help you get back on track.</p>
    <a href="/index.html" class="btn">← Back to Home</a>
    <a href="/book.html" class="btn btn-outline">Book a Service</a>
  </div>
</body>
</html>
